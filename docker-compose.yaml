# docker-compose.yml - Place this in your project root directory
version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: appliance_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword123
      MYSQL_DATABASE: appliance_registration
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: appliance_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  # phpMyAdmin (optional - for easy database management)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    platform: linux/amd64
    container_name: appliance_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: rootpassword123
    depends_on:
      - mysql
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data: